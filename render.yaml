services:
  - type: web
    name: trading-dashboard
    env: python
    plan: free
    rootDir: trading-dashboard
    buildCommand: bash build.sh
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: "8000"
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: SKIP_FRONTEND_BUILD
        value: "false"
