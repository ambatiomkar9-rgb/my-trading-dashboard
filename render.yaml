services:
  - type: web
    name: trading-dashboard
    env: python
    plan: free
    buildCommand: bash build.sh
    startCommand: python backend/main.py
    envVars:
      - key: PORT
        value: "8000"
      # Pin Python version to avoid Render default upgrades breaking deps (e.g. SQLAlchemy).
      - key: PYTHON_VERSION
        value: "3.11.11"
