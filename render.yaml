services:
  - type: web
    name: trading-dashboard
    env: python
    plan: free
    rootDir: . # Changed to project root
    buildCommand: bash ./build.sh # Use the new root-level build.sh
    startCommand: uvicorn trading_system.main:app --host 0.0.0.0 --port $PORT # Run our main app
    envVars:
      - key: PORT
        value: "8000"
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: SKIP_FRONTEND_BUILD
        value: "false"
    disk:
      name: trading-db
      mountPath: /opt/render/project/src/trading_system/data # Adjusted mount path
      sizeGB: 1
