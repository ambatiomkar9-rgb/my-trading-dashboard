<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading Dashboard</title>
    <script type="module" crossorigin src="/assets/index-BbJaBrVl.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BqeBJrLu.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Kill Switch UI injector (works even if frontend bundle wasn't rebuilt yet).
      // This is a safety-critical control, so we prefer "available now" over waiting for a full frontend rebuild.
      (function () {
        const API_URL = "";

        function fetchJson(url, opts) {
          return fetch(url, opts).then(async (res) => {
            const text = await res.text();
            let data = {};
            try {
              data = text ? JSON.parse(text) : {};
            } catch {
              data = { raw: text };
            }
            if (!res.ok) {
              const msg = data && (data.detail || data.raw) ? String(data.detail || data.raw) : "HTTP " + res.status;
              throw new Error(msg);
            }
            return data;
          });
        }

        function createEl(tag, cls, text) {
          const el = document.createElement(tag);
          if (cls) el.className = cls;
          if (text != null) el.textContent = text;
          return el;
        }

        function buildSection() {
          const section = createEl("section", "mb-8 bg-gray-900 p-6 rounded-lg", null);
          section.setAttribute("data-kill-switch", "1");

          const title = createEl("h2", "text-xl font-bold mb-4", "Kill Switch");
          const desc = createEl(
            "div",
            "text-sm text-gray-400 mb-3",
            "If JWT auth is disabled on the server, set ADMIN_API_KEY on Render and enter it here."
          );

          const grid = createEl("div", "grid grid-cols-1 sm:grid-cols-2 gap-4", null);
          const left = createEl("div", "", null);
          const label = createEl("label", "block text-sm mb-2", "Admin Key (X-Admin-Key)");
          const input = createEl(
            "input",
            "w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white",
            null
          );
          input.type = "password";
          input.placeholder = "ADMIN_API_KEY";
          input.value = localStorage.getItem("admin_api_key") || "";
          input.addEventListener("input", () => {
            localStorage.setItem("admin_api_key", input.value || "");
          });
          left.appendChild(label);
          left.appendChild(input);

          const right = createEl("div", "flex items-end gap-2", null);
          const btnEnable = createEl("button", "px-4 py-2 bg-green-600 rounded hover:bg-green-700 disabled:bg-gray-700", "Enable");
          const btnDisable = createEl("button", "px-4 py-2 bg-red-600 rounded hover:bg-red-700 disabled:bg-gray-700", "Disable");
          const status = createEl("div", "text-sm font-semibold", "Unknown");

          function setBusy(b) {
            btnEnable.disabled = b;
            btnDisable.disabled = b;
          }

          async function refresh() {
            try {
              const data = await fetchJson(API_URL + "/api/kill-switch");
              status.textContent = data.trading_enabled ? "ACTIVE" : "DISABLED";
            } catch (e) {
              status.textContent = "Unknown";
            }
          }

          async function toggle(enabled) {
            setBusy(true);
            try {
              const key = input.value || "";
              const headers = { "Content-Type": "application/json" };
              if (key) headers["X-Admin-Key"] = key;
              const data = await fetchJson(API_URL + "/api/kill-switch", {
                method: "POST",
                headers,
                body: JSON.stringify({ enabled }),
              });
              status.textContent = data.trading_enabled ? "ACTIVE" : "DISABLED";
            } catch (e) {
              alert("Kill switch update failed: " + (e && e.message ? e.message : String(e)));
            } finally {
              setBusy(false);
            }
          }

          btnEnable.addEventListener("click", () => toggle(true));
          btnDisable.addEventListener("click", () => toggle(false));

          right.appendChild(btnEnable);
          right.appendChild(btnDisable);
          right.appendChild(status);

          grid.appendChild(left);
          grid.appendChild(right);

          section.appendChild(title);
          section.appendChild(desc);
          section.appendChild(grid);

          // Initial refresh
          refresh();
          return section;
        }

        function injectIfReady() {
          if (document.querySelector("[data-kill-switch]")) return true;

          const h1 = Array.from(document.querySelectorAll("h1")).find((n) => (n.textContent || "").trim() === "Settings");
          if (!h1) return false;
          const container = h1.closest("div");
          if (!container) return false;

          const saveBtn = Array.from(container.querySelectorAll("button")).find((b) =>
            ((b.textContent || "").trim() || "").includes("Save Settings")
          );

          const section = buildSection();
          if (saveBtn && saveBtn.parentElement) {
            saveBtn.parentElement.insertBefore(section, saveBtn);
          } else {
            container.appendChild(section);
          }
          return true;
        }

        const obs = new MutationObserver(() => {
          injectIfReady();
        });
        obs.observe(document.documentElement, { childList: true, subtree: true });
        injectIfReady();
      })();
    </script>
  </body>
</html>
